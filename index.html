<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="image/favicon.png">
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <meta name="theme-color" content="#ffffff">
  <script>
    (function(){
      function setTheme(isDark){
        var meta = document.querySelector('meta[name="theme-color"]');
        if(meta) meta.setAttribute('content', isDark ? '#000000' : '#ffffff');
        try { document.documentElement.dataset.theme = isDark ? 'dark' : 'light'; } catch(e){}
      }

      var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      if(mq){
        setTheme(mq.matches);
        if(mq.addEventListener) mq.addEventListener('change', function(e){ setTheme(e.matches); });
        else if(mq.addListener) mq.addListener(function(e){ setTheme(e.matches); });
      } else {
        setTheme(false);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="web.js"></script>

</head>
<body>
<div id="app">
  <div class="content">

    <div class="screen active" id="s-home">
      <div id="setup-alert"></div>

      <div class="mes-row">
        <button onclick="mudaMes(-1)"><i class="ti ti-chevron-left"></i></button>

        <div class="mes-display" id="mesDisplayHome" onclick="toggleMesPicker(this)">
          <span id="ml1"></span>
          <i class="ti ti-chevron-down" style="margin-left:8px;font-size:16px"></i>
        </div>

        <button onclick="mudaMes(1)"><i class="ti ti-chevron-right"></i></button>
      </div>

      <div id="mes-picker" class="mes-picker" style="display:none">
        <div class="mp-year">
          <button onclick="mpChangeYear(-1)"><i class="ti ti-chevron-left"></i></button>
          <span id="mp-year-val"></span>
          <button onclick="mpChangeYear(1)"><i class="ti ti-chevron-right"></i></button>
        </div>
        <div class="mp-grid" id="mp-grid"></div>
        <div class="mp-actions">
 
        </div>
      </div>

      <div class="saldo-card">
        <div class="saldo-lbl">Saldo restante do mês</div>
        <div class="saldo-val" id="saldo-val">R$ 0,00</div>
        <div class="saldo-sub">
          <span><i class="ti ti-arrow-up" style="font-size:13px;color:var(--success)"></i><span id="sub-entra">R$ 0</span> entrada</span>
          <span><i class="ti ti-arrow-down" style="font-size:13px;color:var(--danger)"></i><span id="sub-saida">R$ 0</span> saídas</span>
        </div>
      </div>

      <div class="mini-cards">
        <div class="mini-card">
          <div class="lbl">Meus gastos</div>
          <div class="val meu" id="tot-meu">R$ 0,00</div>
        </div>
        <div class="mini-card">
          <div class="lbl">Mãe</div>
          <div class="val mae" id="tot-mae">R$ 0,00</div>
        </div>
      </div>

      <div class="sec">categorias do mês</div>
      <div id="barras"></div>

      <button class="btn-add" onclick="irPara('s-add')"><i class="ti ti-plus"></i>Registrar movimentação</button>

      <div class="sec">últimos</div>
      <div id="lista-rec"></div>

    </div>

    <div class="screen" id="s-hist">
      <div class="hdr"><h2>Histórico</h2></div>
      <div class="mes-row">
        <button onclick="mudaMes(-1)"><i class="ti ti-chevron-left"></i></button>

        <div class="mes-display" id="mesDisplayHist" onclick="toggleMesPicker(this)">
          <span id="ml2"></span>
          <i class="ti ti-chevron-down" style="margin-left:8px;font-size:16px"></i>
        </div>

        <button onclick="mudaMes(1)"><i class="ti ti-chevron-right"></i></button>
      </div>

      <div class="tab-row">
        <button class="tab active" id="tab-hist-tudo" onclick="filtroHist('tudo')">Tudo</button>
        <button class="tab" id="tab-hist-gastos" onclick="filtroHist('gastos')">Gastos</button>
        <button class="tab" id="tab-hist-entradas" onclick="filtroHist('entradas')">Entradas</button>
      </div>

      <div id="lista-hist"></div>
    </div>

    <div class="screen" id="s-fixos">
      <div class="hdr"><h2>valores fixos</h2></div>

      <div class="tab-row">
        <button class="tab active" id="tab-lista" onclick="abaFixos('lista')">Meus fixos</button>
        <button class="tab" id="tab-add-fixo-gasto" onclick="abaFixos('add-gasto')">+ Gasto fixo</button>
        <button class="tab" id="tab-add-fixo-entrada" onclick="abaFixos('add-entrada')">+ Entrada fixa</button>
      </div>

      <div id="fixos-lista"></div>

      <div id="fixos-form" style="display:none">
        <div class="fg">
          <label class="fl">Descrição</label>
          <input type="text" id="ff-desc" placeholder="Ex: aluguel, Netflix...">
        </div>

        <div class="fg">
          <label class="fl">Valor (R$)</label>
          <input type="number" id="ff-valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
        </div>

        <div class="fg" id="ff-cat-wrap">
          <label class="fl">Categoria</label>
          <div class="cgrid" id="ff-cat"></div>
        </div>

        <div class="fg" id="ff-quem-wrap">
          <label class="fl">Quem paga?</label>
          <div class="qgrid">
            <button class="qbtn sel meu" id="ff-eu" onclick="fixoQuem('eu')">Eu</button>
            <button class="qbtn" id="ff-mae" onclick="fixoQuem('mae')">Mãe</button>
          </div>
        </div>

        <div class="fg">
          <label class="fl">Duração</label>
          <div class="qgrid">
            <button class="qbtn sel info" id="ff-perm" onclick="fixoDuracao('permanente')"><i class="ti ti-infinity" style="margin-right:4px"></i>Permanente</button>
            <button class="qbtn" id="ff-meses" onclick="fixoDuracao('meses')"><i class="ti ti-calendar-event" style="margin-right:4px"></i>Por meses</button>
          </div>
          <div id="ff-meses-wrap" style="display:none;margin-top:10px">
            <div class="parcelas-row">
              <button class="parc-btn" onclick="mudaFixoMeses(-1)"><i class="ti ti-minus"></i></button>
              <span id="ff-meses-val">1 mês</span>
              <button class="parc-btn" onclick="mudaFixoMeses(1)"><i class="ti ti-plus"></i></button>
            </div>
            <div id="ff-meses-info" class="parc-info" style="display:none"></div>
          </div>
        </div>

        <button class="bsalvar" id="btn-salvar-fixo"><i class="ti ti-check"></i>Salvar fixo</button>
      </div>
    </div>

    <div class="screen" id="s-add">
      <div class="hdr">
        <button class="back" onclick="irPara('s-home')"><i class="ti ti-arrow-left"></i></button>
        <h2>Registrar</h2>
      </div>

      <div class="fg">
        <label class="fl">Tipo</label>
        <div class="qgrid">
          <button class="qbtn sel meu" id="t-saida" onclick="selTipo('saida')"><i class="ti ti-arrow-down" style="margin-right:4px"></i>Saída</button>
          <button class="qbtn" id="t-entrada" onclick="selTipo('entrada')"><i class="ti ti-arrow-up" style="margin-right:4px"></i>Entrada</button>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Descrição</label>
        <input type="text" id="f-desc" placeholder="Ex: mercado, ifood...">
      </div>

      <div class="fg">
        <label class="fl">Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
      </div>

      <div id="f-quem-wrap" class="fg">
        <label class="fl">Quem pagou?</label>
        <div class="qgrid">
          <button class="qbtn sel meu" id="q-eu" onclick="selQuem('eu')">Eu</button>
          <button class="qbtn" id="q-mae" onclick="selQuem('mae')">Mãe</button>
        </div>
      </div>

      <div id="f-cat-wrap" class="fg">
        <label class="fl">Categoria</label>
        <div class="cgrid" id="cat-grid"></div>
      </div>

      <div id="f-parcelas-wrap" class="fg">
        <label class="fl">Parcelas</label>
        <div class="parcelas-row">
          <button class="parc-btn" onclick="mudaParcelas(-1)"><i class="ti ti-minus"></i></button>
          <span id="parc-val">1x</span>
          <button class="parc-btn" onclick="mudaParcelas(1)"><i class="ti ti-plus"></i></button>
        </div>
        <div id="parc-info" class="parc-info" style="display:none"></div>
      </div>

      <button class="bsalvar" onclick="salvarMovimento()"><i class="ti ti-check"></i>Salvar</button>
    </div>

    <div class="screen" id="s-cfg">
      <div class="hdr"><h2>Configurações</h2></div>



      <div class="fg">
      </div>



   

      <div class="cfg-item" style="border:none;cursor:pointer;margin-top:.5rem" onclick="limparTudo()">
        <span class="cfg-lbl" style="color:var(--danger)">Apagar todos os dados</span>
        <i class="ti ti-trash" style="color:var(--danger);font-size:18px"></i>
      </div>
    </div>
  </div>


  <nav class="nav">
    <button class="nbtn active" id="nb-home" onclick="irPara('s-home')"><i class="ti ti-home"></i>Início</button>
    <button class="nbtn" id="nb-hist" onclick="irPara('s-hist')"><i class="ti ti-list"></i>Histórico</button>
    <button class="nbtn" id="nb-fixos" onclick="irPara('s-fixos')"><i class="ti ti-repeat"></i>Fixos</button>
    <button class="nbtn" id="nb-cfg" onclick="irPara('s-cfg')"><i class="ti ti-settings"></i>Config</button>
  </nav>
</div>
</body>
</html>
