<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="src/image/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f5f5f4; --bg3:#efefed;
      --text:#1a1a19; --text2:#6b6b68;
      --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.22);
      --danger:#c0392b; --danger-bg:#fdf0ee;
      --warn:#b45309; --warn-bg:#fef9ee;
      --info:#1560a0; --info-bg:#e6f1fb;
      --success:#166534; --success-bg:#dcfce7;
      --r:10px; --rl:12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1c1c1b; --bg2:#262625; --bg3:#2e2e2d;
        --text:#f0efe8; --text2:#9a9a96;
        --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.20);
        --danger:#e57373; --danger-bg:#3b1c1c;
        --warn:#f0a030; --warn-bg:#332510;
        --info:#60aaee; --info-bg:#0c2a44;
        --success:#4ade80; --success-bg:#14532d;
      }
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg3); color:var(--text); min-height:100dvh; display:flex; justify-content:center; }
    #app { width:100%; max-width:430px; background:var(--bg); min-height:100dvh; display:flex; flex-direction:column; }
    .content { flex:1; overflow-y:auto; padding-bottom:70px; }
    .screen { display:none; padding:1rem 1rem 0; }
    .screen.active { display:block; }
    .hdr { display:flex; align-items:center; gap:10px; margin-bottom:1.25rem; }
    .hdr h2 { font-size:18px; font-weight:500; color:var(--text); }
    .back { background:none; border:none; cursor:pointer; color:var(--text2); font-size:22px; display:flex; align-items:center; padding:0; }
    .mes-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.1rem; }
    .mes-row button { background:none; border:none; cursor:pointer; color:var(--text2); font-size:22px; display:flex; align-items:center; padding:4px; }
    .mes-row span { font-size:15px; font-weight:500; color:var(--text); }
    .saldo-card { background:var(--bg2); border-radius:var(--rl); padding:1.1rem; margin-bottom:.9rem; }
    .saldo-lbl { font-size:11px; color:var(--text2); margin-bottom:3px; }
    .saldo-val { font-size:28px; font-weight:500; color:var(--text); }
    .saldo-val.neg { color:var(--danger); }
    .saldo-sub { font-size:12px; color:var(--text2); margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; }
    .saldo-sub span { display:flex; align-items:center; gap:3px; }
    .mini-cards { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; margin-bottom:1rem; }
    .mini-card { background:var(--bg2); border-radius:var(--r); padding:.7rem; }
    .mini-card .lbl { font-size:11px; color:var(--text2); margin-bottom:3px; }
    .mini-card .val { font-size:16px; font-weight:500; color:var(--text); }
    .mini-card .val.meu { color:var(--danger); }
    .mini-card .val.mae { color:var(--warn); }
    .sec { font-size:11px; font-weight:500; color:var(--text2); margin:1rem 0 8px; letter-spacing:.04em; text-transform:uppercase; }
    .btn-add { width:100%; padding:12px; background:var(--bg); border:.5px solid var(--border2); border-radius:var(--r); font-size:14px; font-weight:500; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; margin:1rem 0 .5rem; }
    .btn-add:active { opacity:.6; }
    .item { background:var(--bg); border:.5px solid var(--border); border-radius:var(--r); padding:.7rem .9rem; margin-bottom:7px; display:flex; align-items:center; gap:11px; }
    .item-ico { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .item-info { flex:1; min-width:0; }
    .item-desc { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-meta { font-size:11px; color:var(--text2); margin-top:2px; display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
    .badge { font-size:10px; padding:2px 6px; border-radius:20px; font-weight:500; }
    .badge.meu { background:var(--danger-bg); color:var(--danger); }
    .badge.mae { background:var(--warn-bg); color:var(--warn); }
    .badge.fixo { background:var(--success-bg); color:var(--success); }
    .item-val { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; }
    .item-del { background:none; border:none; cursor:pointer; color:var(--text2); font-size:16px; padding:4px; display:flex; align-items:center; }
    .item-del:active { color:var(--danger); }
    .barra-wrap { margin-bottom:9px; }
    .barra-lbl { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; color:var(--text2); }
    .barra-bg { background:var(--bg2); border-radius:4px; height:7px; overflow:hidden; }
    .barra-fill { height:7px; border-radius:4px; transition:width .3s; }
    .fg { margin-bottom:.9rem; }
    .fl { font-size:13px; color:var(--text2); margin-bottom:5px; display:block; }
    input[type=text], input[type=number] { width:100%; padding:10px 11px; background:var(--bg2); border:.5px solid var(--border); border-radius:var(--r); font-size:15px; color:var(--text); outline:none; -webkit-appearance:none; }
    input:focus { border-color:var(--border2); }
    .qgrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; }
    .qbtn { padding:12px; border:.5px solid var(--border); border-radius:var(--r); background:var(--bg2); cursor:pointer; font-size:14px; font-weight:500; color:var(--text); text-align:center; }
    .qbtn.sel.meu { border:1.5px solid var(--danger); background:var(--danger-bg); color:var(--danger); }
    .qbtn.sel.mae { border:1.5px solid var(--warn); background:var(--warn-bg); color:var(--warn); }
    .cgrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; }
    .cbtn { padding:9px 7px; border:.5px solid var(--border); border-radius:var(--r); background:var(--bg2); cursor:pointer; display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text); }
    .cbtn.sel { border:1.5px solid var(--info); background:var(--info-bg); color:var(--info); }
    .bsalvar { width:100%; padding:13px; background:var(--bg); border:.5px solid var(--border2); border-radius:var(--r); font-size:14px; font-weight:500; color:var(--text); cursor:pointer; margin-top:.5rem; }
    .bsalvar:active { opacity:.6; }
    .cfg-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:.5px solid var(--border); }
    .cfg-lbl { font-size:15px; color:var(--text); }
    .cfg-val { font-size:13px; color:var(--text2); }
    .empty { text-align:center; color:var(--text2); font-size:13px; padding:1.5rem 0; }
    .tab-row { display:flex; gap:6px; margin-bottom:1rem; }
    .tab { flex:1; padding:8px; background:var(--bg2); border:.5px solid var(--border); border-radius:var(--r); font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; text-align:center; }
    .tab.active { background:var(--bg); border-color:var(--border2); color:var(--text); }
    .nav { display:flex; border-top:.5px solid var(--border); position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--bg); z-index:100; padding-bottom:env(safe-area-inset-bottom,0px); }
    .nbtn { flex:1; padding:11px 0 9px; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:10px; color:var(--text2); }
    .nbtn.active { color:var(--text); }
    .nbtn i { font-size:22px; }
  </style>
</head>
<body>
<div id="app">
  <div class="content">

    <div class="screen active" id="s-home">
      <div class="mes-row">
        <button onclick="mudaMes(-1)"><i class="ti ti-chevron-left"></i></button>
        <span id="ml1"></span>
        <button onclick="mudaMes(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="saldo-card">
        <div class="saldo-lbl">Saldo restante do mes</div>
        <div class="saldo-val" id="saldo-val">R$ 0,00</div>
        <div class="saldo-sub">
          <span><i class="ti ti-arrow-up" style="font-size:13px;color:var(--success)"></i><span id="sub-entra">R$ 0</span> entrada</span>
          <span><i class="ti ti-arrow-down" style="font-size:13px;color:var(--danger)"></i><span id="sub-saida">R$ 0</span> saidas</span>
        </div>
      </div>
      <div class="mini-cards">
        <div class="mini-card"><div class="lbl">Meus gastos</div><div class="val meu" id="tot-meu">R$ 0,00</div></div>
        <div class="mini-card"><div class="lbl">Da minha mae</div><div class="val mae" id="tot-mae">R$ 0,00</div></div>
      </div>
      <div class="sec">categorias do mes</div>
      <div id="barras"></div>
      <div class="sec" style="margin-top:.8rem">ultimos gastos</div>
      <div id="lista-rec"></div>
      <button class="btn-add" onclick="irPara('s-add')"><i class="ti ti-plus"></i>Registrar gasto</button>
    </div>

    <div class="screen" id="s-hist">
      <div class="hdr"><h2>Historico</h2></div>
      <div class="mes-row">
        <button onclick="mudaMes(-1)"><i class="ti ti-chevron-left"></i></button>
        <span id="ml2"></span>
        <button onclick="mudaMes(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div id="lista-hist"></div>
    </div>

    <div class="screen" id="s-fixos">
      <div class="hdr"><h2>Gastos fixos</h2></div>
      <div class="tab-row">
        <button class="tab active" id="tab-lista" onclick="abaFixos('lista')">Meus fixos</button>
        <button class="tab" id="tab-add" onclick="abaFixos('add')">+ Novo fixo</button>
      </div>
      <div id="fixos-lista"></div>
      <div id="fixos-form" style="display:none">
        <div class="fg"><label class="fl">Descricao</label><input type="text" id="ff-desc" placeholder="Ex: aluguel, Netflix..." /></div>
        <div class="fg"><label class="fl">Valor (R$)</label><input type="number" id="ff-valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal" /></div>
        <div class="fg"><label class="fl">Categoria</label><div class="cgrid" id="ff-cat"></div></div>
        <div class="fg"><label class="fl">Quem paga?</label>
          <div class="qgrid">
            <button class="qbtn sel meu" id="ff-eu" onclick="fixoQuem('eu')">Eu (Gabriel)</button>
            <button class="qbtn" id="ff-mae" onclick="fixoQuem('mae')">Minha mae</button>
          </div>
        </div>
        <button class="bsalvar" onclick="salvarFixo()"><i class="ti ti-check"></i> Salvar fixo</button>
      </div>
    </div>

    <div class="screen" id="s-add">
      <div class="hdr">
        <button class="back" onclick="irPara('s-home')"><i class="ti ti-arrow-left"></i></button>
        <h2>Registrar gasto</h2>
      </div>
      <div class="fg"><label class="fl">Descricao</label><input type="text" id="f-desc" placeholder="Ex: mercado, ifood..." /></div>
      <div class="fg"><label class="fl">Valor (R$)</label><input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal" /></div>
      <div class="fg"><label class="fl">Quem pagou?</label>
        <div class="qgrid">
          <button class="qbtn sel meu" id="q-eu" onclick="selQuem('eu')">Eu (Gabriel)</button>
          <button class="qbtn" id="q-mae" onclick="selQuem('mae')">Minha mae</button>
        </div>
      </div>
      <div class="fg"><label class="fl">Categoria</label><div class="cgrid" id="cat-grid"></div></div>
      <button class="bsalvar" onclick="salvarGasto()"><i class="ti ti-check"></i> Salvar</button>
    </div>

    <div class="screen" id="s-cfg">
      <div class="hdr"><h2>Configuracoes</h2></div>
      <div class="sec">entrada deste mes</div>
      <div class="fg">
        <label class="fl">Renda base (R$) - salva so para <span id="cfg-mes-nome"></span></label>
        <div style="display:flex;gap:8px">
          <input type="number" id="inp-base" placeholder="700" style="flex:1" inputmode="decimal" />
          <button class="bsalvar" style="width:auto;padding:11px 14px;margin-top:0" onclick="salvarBase()">Salvar</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Entrada extra neste mes (R$)</label>
        <div style="display:flex;gap:8px">
          <input type="number" id="inp-extra" placeholder="0,00" style="flex:1" inputmode="decimal" />
          <button class="bsalvar" style="width:auto;padding:11px 14px;margin-top:0" onclick="salvarExtra()">Salvar</button>
        </div>
      </div>
      <div class="cfg-item"><span class="cfg-lbl">Base atual</span><span class="cfg-val" id="cfg-base-val"></span></div>
      <div class="cfg-item"><span class="cfg-lbl">Extra atual</span><span class="cfg-val" id="cfg-extra-val"></span></div>
      <div class="cfg-item" style="border:none;cursor:pointer;margin-top:.5rem" onclick="if(confirm('Apagar tudo?')){limpar()}">
        <span class="cfg-lbl" style="color:var(--danger)">Apagar todos os dados</span>
        <i class="ti ti-trash" style="color:var(--danger);font-size:18px"></i>
      </div>
    </div>

  </div>

  <nav class="nav">
    <button class="nbtn active" id="nb-home" onclick="irPara('s-home')"><i class="ti ti-home"></i>Inicio</button>
    <button class="nbtn" id="nb-hist" onclick="irPara('s-hist')"><i class="ti ti-list"></i>Historico</button>
    <button class="nbtn" id="nb-fixos" onclick="irPara('s-fixos')"><i class="ti ti-repeat"></i>Fixos</button>
    <button class="nbtn" id="nb-cfg" onclick="irPara('s-cfg')"><i class="ti ti-settings"></i>Config</button>
  </nav>
</div>
<script>
const CATS=[
  {id:"alimentacao",label:"Alimentacao",icon:"ti-shopping-cart",cor:"#1D9E75"},
  {id:"transporte",label:"Transporte",icon:"ti-bus",cor:"#378ADD"},
  {id:"moradia",label:"Moradia",icon:"ti-home",cor:"#7F77DD"},
  {id:"assinatura",label:"Assinatura",icon:"ti-player-play",cor:"#D4537E"},
  {id:"saude",label:"Saude",icon:"ti-heart",cor:"#D85A30"},
  {id:"pessoal",label:"Pessoal",icon:"ti-user",cor:"#B45309"},
  {id:"lazer",label:"Lazer",icon:"ti-device-gamepad",cor:"#0F6E56"},
  {id:"outros",label:"Outros",icon:"ti-dots",cor:"#888780"},
];
const KEY="fin_gabriel_v3";
let st={gastos:[],fixos:[],meses:{}};
let mesSel=new Date().getMonth(),anoSel=new Date().getFullYear();
let quemSel="eu",catSel="alimentacao";
let fixoQuemSel="eu",fixoCatSel="moradia";

function mkKey(m,a){return a+"-"+m;}
function getMes(){return st.meses[mkKey(mesSel,anoSel)]||{base:700,extra:0};}
function setMes(obj){st.meses[mkKey(mesSel,anoSel)]=obj;}

function load(){
  try{const r=localStorage.getItem(KEY);if(r){const p=JSON.parse(r);st.gastos=p.gastos||[];st.fixos=p.fixos||[];st.meses=p.meses||{};}}catch(e){}
  renderAll();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){}}
function fmt(v){return "R$ "+v.toFixed(2).replace(".",",");}
function nomeMes(m,a){return new Date(a,m,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});}
function mudaMes(d){mesSel+=d;if(mesSel<0){mesSel=11;anoSel--;}if(mesSel>11){mesSel=0;anoSel++;}renderAll();}

function irPara(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nbtn").forEach(b=>b.classList.remove("active"));
  const m={"s-home":"nb-home","s-hist":"nb-hist","s-fixos":"nb-fixos","s-cfg":"nb-cfg"};
  if(m[id])document.getElementById(m[id]).classList.add("active");
  if(id!=="s-add")renderAll();
  document.querySelector(".content").scrollTop=0;
}

function selQuem(q){quemSel=q;document.getElementById("q-eu").className="qbtn"+(q==="eu"?" sel meu":"");document.getElementById("q-mae").className="qbtn"+(q==="mae"?" sel mae":"");}
function fixoQuem(q){fixoQuemSel=q;document.getElementById("ff-eu").className="qbtn"+(q==="eu"?" sel meu":"");document.getElementById("ff-mae").className="qbtn"+(q==="mae"?" sel mae":"");}

function renderCatGrid(cid,sel,fn){
  const g=document.getElementById(cid);if(!g)return;
  g.innerHTML=CATS.map(c=>`<button class="cbtn${sel===c.id?" sel":""}" onclick="${fn}('${c.id}')"><i class="ti ${c.icon}" style="font-size:15px"></i>${c.label}</button>`).join("");
}
function selCat(id){catSel=id;renderCatGrid("cat-grid",catSel,"selCat");}
function selFixoCat(id){fixoCatSel=id;renderCatGrid("ff-cat",fixoCatSel,"selFixoCat");}
function gastosMes(){return st.gastos.filter(g=>{const d=new Date(g.data);return d.getMonth()===mesSel&&d.getFullYear()===anoSel;});}

function salvarGasto(){
  const desc=document.getElementById("f-desc").value.trim();
  const valor=parseFloat(document.getElementById("f-valor").value);
  if(!desc||isNaN(valor)||valor<=0){alert("Preencha descricao e valor.");return;}
  st.gastos.push({id:Date.now(),desc,valor,quem:quemSel,cat:catSel,data:new Date().toISOString()});
  save();document.getElementById("f-desc").value="";document.getElementById("f-valor").value="";
  quemSel="eu";selQuem("eu");catSel="alimentacao";renderCatGrid("cat-grid",catSel,"selCat");irPara("s-home");
}
function deletarGasto(id){if(!confirm("Remover este gasto?"))return;st.gastos=st.gastos.filter(g=>g.id!==id);save();renderAll();}

function salvarFixo(){
  const desc=document.getElementById("ff-desc").value.trim();
  const valor=parseFloat(document.getElementById("ff-valor").value);
  if(!desc||isNaN(valor)||valor<=0){alert("Preencha descricao e valor.");return;}
  st.fixos.push({id:Date.now(),desc,valor,quem:fixoQuemSel,cat:fixoCatSel});
  save();document.getElementById("ff-desc").value="";document.getElementById("ff-valor").value="";
  fixoQuemSel="eu";fixoQuem("eu");fixoCatSel="moradia";
  renderCatGrid("ff-cat",fixoCatSel,"selFixoCat");abaFixos("lista");renderAll();
}
function deletarFixo(id){if(!confirm("Remover gasto fixo?"))return;st.fixos=st.fixos.filter(f=>f.id!==id);save();renderAll();}

function abaFixos(aba){
  document.getElementById("fixos-lista").style.display=aba==="lista"?"block":"none";
  document.getElementById("fixos-form").style.display=aba==="add"?"block":"none";
  document.getElementById("tab-lista").className="tab"+(aba==="lista"?" active":"");
  document.getElementById("tab-add").className="tab"+(aba==="add"?" active":"");
  if(aba==="add")renderCatGrid("ff-cat",fixoCatSel,"selFixoCat");
}
function salvarBase(){const v=parseFloat(document.getElementById("inp-base").value);if(!isNaN(v)&&v>0){const m=getMes();m.base=v;setMes(m);save();renderAll();document.getElementById("inp-base").value="";}}
function salvarExtra(){const v=parseFloat(document.getElementById("inp-extra").value);if(!isNaN(v)&&v>=0){const m=getMes();m.extra=v;setMes(m);save();renderAll();document.getElementById("inp-extra").value="";}}
function limpar(){st={gastos:[],fixos:[],meses:{}};save();renderAll();}

function itemHtml(g,isFixo){
  const cat=CATS.find(c=>c.id===g.cat)||CATS[7];
  const dia=g.data?new Date(g.data).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}):"fixo";
  return `<div class="item">
    <div class="item-ico" style="background:${cat.cor}22"><i class="ti ${cat.icon}" style="color:${cat.cor};font-size:15px"></i></div>
    <div class="item-info">
      <div class="item-desc">${g.desc}</div>
      <div class="item-meta">
        <span class="badge ${g.quem==="eu"?"meu":"mae"}">${g.quem==="eu"?"Meu":"Mae"}</span>
        ${isFixo?"<span class=\"badge fixo\">fixo</span>":""}
        ${cat.label}${g.data?" - "+dia:""}
      </div>
    </div>
    <div class="item-val">${fmt(g.valor)}</div>
    <button class="item-del" onclick="${isFixo?"deletarFixo":"deletarGasto"}(${g.id})"><i class="ti ti-x"></i></button>
  </div>`;
}

function renderAll(){
  const mes=getMes();const gm=gastosMes();
  const tAM=gm.filter(g=>g.quem==="eu").reduce((a,g)=>a+g.valor,0);
  const tAMae=gm.filter(g=>g.quem==="mae").reduce((a,g)=>a+g.valor,0);
  const tFM=st.fixos.filter(f=>f.quem==="eu").reduce((a,f)=>a+f.valor,0);
  const tFMae=st.fixos.filter(f=>f.quem==="mae").reduce((a,f)=>a+f.valor,0);
  const tM=tAM+tFM,tMae=tAMae+tFMae;
  const ent=mes.base+mes.extra,saldo=ent-tM;
  const mesStr=nomeMes(mesSel,anoSel);
  ["ml1","ml2"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=mesStr;});
  const sv=document.getElementById("saldo-val");if(sv){sv.textContent=fmt(saldo);sv.className="saldo-val"+(saldo<0?" neg":"");}
  const se=document.getElementById("sub-entra");if(se)se.textContent=fmt(ent);
  const ss=document.getElementById("sub-saida");if(ss)ss.textContent=fmt(tM);
  const tm=document.getElementById("tot-meu");if(tm)tm.textContent=fmt(tM);
  const tma=document.getElementById("tot-mae");if(tma)tma.textContent=fmt(tMae);
  const barrasEl=document.getElementById("barras");
  if(barrasEl){
    if(tM===0){barrasEl.innerHTML="<p class=\"empty\">Nenhum gasto registrado ainda</p>";}
    else{
      const todos=[...gm.filter(g=>g.quem==="eu"),...st.fixos.filter(f=>f.quem==="eu")];
      barrasEl.innerHTML=CATS.map(c=>{
        const tot=todos.filter(g=>g.cat===c.id).reduce((a,g)=>a+g.valor,0);
        if(tot===0)return"";
        const pct=Math.min(100,Math.round((tot/tM)*100));
        return`<div class="barra-wrap"><div class="barra-lbl"><span>${c.label}</span><span>${fmt(tot)}</span></div><div class="barra-bg"><div class="barra-fill" style="width:${pct}%;background:${c.cor}"></div></div></div>`;
      }).join("");
    }
  }
  const recentes=[...st.fixos.slice(0,2).map(f=>({...f,isFixo:true})),...[...gm].sort((a,b)=>b.id-a.id).slice(0,4).map(g=>({...g,isFixo:false}))];
  const lr=document.getElementById("lista-rec");if(lr)lr.innerHTML=recentes.length===0?"<p class=\"empty\">Sem gastos neste mes</p>":recentes.map(g=>itemHtml(g,g.isFixo)).join("");
  const lh=document.getElementById("lista-hist");
  if(lh){const todos=[...st.fixos.map(f=>({...f,isFixo:true})),...[...gm].sort((a,b)=>b.id-a.id).map(g=>({...g,isFixo:false}))];lh.innerHTML=todos.length===0?"<p class=\"empty\">Sem gastos neste mes</p>":todos.map(g=>itemHtml(g,g.isFixo)).join("");}
  const fl=document.getElementById("fixos-lista");if(fl)fl.innerHTML=st.fixos.length===0?"<p class=\"empty\">Nenhum gasto fixo cadastrado ainda</p>":st.fixos.map(f=>itemHtml(f,true)).join("");
  const cfgMN=document.getElementById("cfg-mes-nome");if(cfgMN)cfgMN.textContent=mesStr;
  const cbv=document.getElementById("cfg-base-val");if(cbv)cbv.textContent=fmt(mes.base);
  const cev=document.getElementById("cfg-extra-val");if(cev)cev.textContent=fmt(mes.extra);
  renderCatGrid("cat-grid",catSel,"selCat");
}
load();
</script>
</body>
</html>
