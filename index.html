<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="image/favicon.png">
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="web.js">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>
<div id="app">
  <div class="content">

    <div class="screen active" id="s-home">
      <div id="setup-alert"></div>

      <div class="mes-row">
        <button onclick="mudaMes(-1)"><i class="ti ti-chevron-left"></i></button>
        <span id="ml1"></span>
        <button onclick="mudaMes(1)"><i class="ti ti-chevron-right"></i></button>
      </div>

      <div class="saldo-card">
        <div class="saldo-lbl">Saldo restante do mês</div>
        <div class="saldo-val" id="saldo-val">R$ 0,00</div>
        <div class="saldo-sub">
          <span><i class="ti ti-arrow-up" style="font-size:13px;color:var(--success)"></i><span id="sub-entra">R$ 0</span> entrada</span>
          <span><i class="ti ti-arrow-down" style="font-size:13px;color:var(--danger)"></i><span id="sub-saida">R$ 0</span> saídas</span>
        </div>
      </div>

      <div class="mini-cards">
        <div class="mini-card">
          <div class="lbl">Meus gastos</div>
          <div class="val meu" id="tot-meu">R$ 0,00</div>
        </div>
        <div class="mini-card">
          <div class="lbl">Da minha mãe</div>
          <div class="val mae" id="tot-mae">R$ 0,00</div>
        </div>
      </div>

      <div class="sec">categorias do mês</div>
      <div id="barras"></div>

      <div class="sec">últimos gastos</div>
      <div id="lista-rec"></div>

      <button class="btn-add" onclick="irPara('s-add')"><i class="ti ti-plus"></i>Registrar gasto</button>
    </div>

    <div class="screen" id="s-hist">
      <div class="hdr"><h2>Histórico</h2></div>
      <div class="mes-row">
        <button onclick="mudaMes(-1)"><i class="ti ti-chevron-left"></i></button>
        <span id="ml2"></span>
        <button onclick="mudaMes(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div id="lista-hist"></div>
    </div>

    <div class="screen" id="s-fixos">
      <div class="hdr"><h2>Gastos fixos</h2></div>

      <div class="tab-row">
        <button class="tab active" id="tab-lista" onclick="abaFixos('lista')">Meus fixos</button>
        <button class="tab" id="tab-add" onclick="abaFixos('add')">+ Novo fixo</button>
      </div>

      <div id="fixos-lista"></div>

      <div id="fixos-form" style="display:none">
        <div class="fg">
          <label class="fl">Descrição</label>
          <input type="text" id="ff-desc" placeholder="Ex: aluguel, Netflix...">
        </div>

        <div class="fg">
          <label class="fl">Valor (R$)</label>
          <input type="number" id="ff-valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
        </div>

        <div class="fg">
          <label class="fl">Categoria</label>
          <div class="cgrid" id="ff-cat"></div>
        </div>

        <div class="fg">
          <label class="fl">Quem paga?</label>
          <div class="qgrid">
            <button class="qbtn sel meu" id="ff-eu" onclick="fixoQuem('eu')">Eu, Gabriel</button>
            <button class="qbtn" id="ff-mae" onclick="fixoQuem('mae')">Minha mãe</button>
          </div>
        </div>

        <button class="bsalvar" onclick="salvarFixo()"><i class="ti ti-check"></i>Salvar fixo</button>
      </div>
    </div>

    <div class="screen" id="s-add">
      <div class="hdr">
        <button class="back" onclick="irPara('s-home')"><i class="ti ti-arrow-left"></i></button>
        <h2>Registrar gasto</h2>
      </div>

      <div class="fg">
        <label class="fl">Descrição</label>
        <input type="text" id="f-desc" placeholder="Ex: mercado, ifood...">
      </div>

      <div class="fg">
        <label class="fl">Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
      </div>

      <div class="fg">
        <label class="fl">Quem pagou?</label>
        <div class="qgrid">
          <button class="qbtn sel meu" id="q-eu" onclick="selQuem('eu')">Eu, Gabriel</button>
          <button class="qbtn" id="q-mae" onclick="selQuem('mae')">Minha mãe</button>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Categoria</label>
        <div class="cgrid" id="cat-grid"></div>
      </div>

      <button class="bsalvar" onclick="salvarGasto()"><i class="ti ti-check"></i>Salvar</button>
    </div>

    <div class="screen" id="s-cfg">
      <div class="hdr"><h2>Configurações</h2></div>

      <div class="sec">entrada deste mês</div>

      <div class="fg">
        <label class="fl">Renda base, salva só para <span id="cfg-mes-nome"></span></label>
        <div style="display:flex;gap:8px">
          <input type="number" id="inp-base" placeholder="700" style="flex:1" inputmode="decimal">
          <button class="bsalvar" style="width:auto;padding:11px 14px;margin-top:0" onclick="salvarBase()">Salvar</button>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Entrada extra neste mes</label>
        <div style="display:flex;gap:8px">
          <input type="number" id="inp-extra" placeholder="0,00" style="flex:1" inputmode="decimal">
          <button class="bsalvar" style="width:auto;padding:11px 14px;margin-top:0" onclick="salvarExtra()">Salvar</button>
        </div>
      </div>

      <div class="cfg-item">
        <span class="cfg-lbl">Base atual</span>
        <span class="cfg-val" id="cfg-base-val"></span>
      </div>

      <div class="cfg-item">
        <span class="cfg-lbl">Extra atual</span>
        <span class="cfg-val" id="cfg-extra-val"></span>
      </div>

      <div class="cfg-item" style="border:none;cursor:pointer;margin-top:.5rem" onclick="limparTudo()">
        <span class="cfg-lbl" style="color:var(--danger)">Apagar todos os dados</span>
        <i class="ti ti-trash" style="color:var(--danger);font-size:18px"></i>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nbtn active" id="nb-home" onclick="irPara('s-home')"><i class="ti ti-home"></i>Início</button>
    <button class="nbtn" id="nb-hist" onclick="irPara('s-hist')"><i class="ti ti-list"></i>Histórico</button>
    <button class="nbtn" id="nb-fixos" onclick="irPara('s-fixos')"><i class="ti ti-repeat"></i>Fixos</button>
    <button class="nbtn" id="nb-cfg" onclick="irPara('s-cfg')"><i class="ti ti-settings"></i>Config</button>
  </nav>
</div>
</body>
</html>
